[phases.setup]
nixPkgs = ["python311", "stdenv.cc.cc.lib", "zlib", "gcc"]

[phases.install]
cmds = [
    "python3 -m venv /app/.venv",
    "/app/.venv/bin/pip install -r requirements.txt"
]

[start]
cmd = "LD_LIBRARY_PATH=/nix/var/nix/profiles/default/lib /app/.venv/bin/python -m uvicorn agents.overseer.main:app --host 0.0.0.0 --port ${PORT:-8000}"
